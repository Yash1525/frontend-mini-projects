<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    font-family: Arial;
}

header, footer {
    background: black;
    color: white;
    text-align: center;
    padding: 15px;
}

section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
}

img {
    width: 200px;
    border-radius: 10px;
}

/* Mobile */
@media (max-width: 600px) {
    section {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<header>
<h1>APJ Abdul Kalam</h1>
</header>

<section>
<img src="/images.jpg/APJ.jpg">
<p>He was a great scientist and President of India.</p>
</section>

<footer>
<p>Tribute Page</p>
</footer>

</body>
</html>
