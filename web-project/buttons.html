<!DOCTYPE html>
<html>
<head>
<style>
button {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.black {
    background: black;
    color: white;
}

.gradient {
    background: linear-gradient(to right, purple, pink);
    color: white;
}

button:hover {
    opacity: 0.8;
    transform: scale(1.05);
    box-shadow: 0 5px 15px gray;
}
</style>
</head>

<body>

<button class="black">Uber Button</button>
<button class="gradient">Gradient Button</button>

</body>
</html>
